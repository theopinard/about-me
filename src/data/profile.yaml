bio: >
  **Data Science & MLOps Engineering Manager** at GetYourGuide with a passion for building high-impact
  machine learning systems and the teams that create them. I bridge the gap between
  **research and production** by turning ideas into reliable, scalable data and ML products.
  I am also active in the Berlin data community as an [organizer](@community) and [conference speaker](@talks).

work:
  - company: GetYourGuide
    url: https://www.linkedin.com/company/getyourguide-ag/
    role: Data Science & MLOps Engineering Manager
    period: Feb 2023 – Present
    description: >
      Lead a team of Data Scientists and MLOps Engineers building **ranking and search systems**
      for marketplace discovery. Use classical ML, Deep Learning, and LLMs to improve user experience.
      Own technical strategy, hiring, performance, and roadmap. Led the evolution of the ranking system
      from static scoring to gradient boosted trees ([link](@blog:2023-from-batch-to-real-time-the-incremental-mlops-journey-at-getyourguide))
      and ultimately deep learning models ([link](@blog:2025-from-trees-to-transformers)),
      driving significant business impact.

  - company: GetYourGuide
    url: https://www.linkedin.com/company/getyourguide-ag/
    role: Senior / Staff Data Scientist
    period: Aug 2020 – Feb 2023
    description: >
      Owned end-to-end **ranking and recommendation models**: training new
      iterations, running live A/B experiments, and analysing results to guide
      product decisions. Built and scaled the internal **ML platform** to introduce
      CI/CD, testing standards, and reproducible training/deployment workflows
      (see [part 1](@blog:2021-laying-the-foundation-of-our-open-source-ml-platform-with-a-modern-ci-cd-pipeline)
      & [part 2](@blog:2022-how-we-extended-our-open-source-ml-platform-to-support-real-time-inference)).
      Co-led the Data Engineering guild to coordinate cross-team technical initiatives.

  - company: plista (WPP)
    url: https://www.linkedin.com/company/groupm-plista/
    role: Machine Learning Engineer
    period: Oct 2018 – Jun 2020
    description: >
      Improved article recommendation performance by **~20%** using gradient
      boosted models (XGBoost). Deployed BERT-based semantic feature extraction
      pipelines (Python, Scala, Spark). Migrated the recommendation stack to AWS
      using Terraform. Organised monthly ML paper readings to foster technical
      knowledge sharing across engineering teams.

  - company: optilyz
    url: https://www.linkedin.com/company/optilyz/
    role: Data Scientist
    period: Sep 2017 – Oct 2018
    description: >
      Owned the full data science lifecycle for direct mail marketing optimisation
      Built fraud detection and data cleansing systems (Python, MongoDB, AWS),
      implemented campaign targeting models, and created a GDPR-compliant data lake.

